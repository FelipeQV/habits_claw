version: 1.0
status: draft

agent:
  id: kevin
  name: Kevin
  dimension: workout
  description: >
    Orchestrates Felipe's gym routine workflow by resolving the active routine pointer at
    /home/ubuntu/habit_tracker/reference/routine_workout.active.json and then loading the
    versioned routine JSON (`active_version`) from /home/ubuntu/habit_tracker/reference/.
    This keeps historical routine JSON files immutable while enabling day-specific execution,
    YouTube demos, and previous set/weight reminders.

inherits:
  capability_definitions: capabilities_standards/governance/capability_definitions.yaml

data_model:
  table:
    name: kevin_workouts
  fields:
    - name: date
      type: date
      set_by: agent
    - name: cardio_minutes
      type: integer
      set_by: agent
    - name: cardio_type
      type: string
      set_by: user
    - name: yoga_done
      type: boolean
      set_by: user
    - name: yoga_type
      type: string
      set_by: user
    - name: routine_block
      type: string
      set_by: agent
    - name: routine_day
      type: integer
      set_by: agent
    - name: exercise_name
      type: string
      set_by: agent
    - name: exercise_order
      type: integer
      set_by: agent
    - name: sets_target
      type: integer
      set_by: agent
    - name: reps_target
      type: string
      set_by: agent
    - name: youtube_link
      type: string
      set_by: agent
    - name: previous_weight
      type: number
      set_by: agent
    - name: previous_reps
      type: string
      set_by: agent
    - name: current_weight
      type: number
      set_by: user
    - name: routine_source_file
      type: string
      set_by: agent
      notes: Points to the JSON derived from the PDF plan
    - name: routine_completed
      type: boolean
      set_by: agent
    - name: corrected
      type: boolean
      set_by: agent
    - name: record_id
      type: string
      set_by: agent
      notes: places unique token for each row

targets:
  enabled: true
  nodes:
    - name: routine_adherence
      description: Keeps Felipe aligned with the correct day, order, and exercise targets as defined by
        the JSON plan.

capabilities:
  log:
    inherits: capability_definitions.log
    subtypes:
      - name: routine_session
        active: true
        table: workouts
        binding:
          id: log_routine_session
          inference: estimate_allowed_with_flag
          correction_strategy: append_only
      - name: cardio_run
        active: true
        table: workouts
        binding:
          id: log_cardio
          inference: estimate_allowed_with_flag
          correction_strategy: append_only
      - name: yoga_session
        active: true
        table: workouts
        binding:
          id: log_yoga
          inference: estimate_allowed_with_flag
          correction_strategy: append_only

  update:
    inherits: capability_definitions.update
    subtypes:
      - name: routine_weight
        active: true
        table: workouts
        binding:
          id: update_exercise_weight
          inference: estimate_allowed_with_flag
          correction_strategy: append_only
      - name: cardio_run
        active: true
        table: workouts
        binding:
          id: update_cardio
          inference: estimate_allowed_with_flag
          correction_strategy: append_only
      - name: yoga_session
        active: true
        table: workouts
        binding:
          id: update_yoga
          inference: estimate_allowed_with_flag
          correction_strategy: append_only

  report:
    inherits: capability_definitions.report
    subtypes:
      - name: routine_progress
        active: true
        table: workouts
        binding:
          id: report_routine_progress

  analyze:
    inherits: capability_definitions.analyze
    subtypes:
      - name: routine
        active: true
        table: workouts
        binding:
          id: analyze_routine

  prescribe:
    owned_by: orchestration_agent
